allow = ["Edit", "Bash(cd /d/onlyfans && cat > /tmp/check_todo.py << 'PYEOF'\nimport yaml\nimport os\nimport re\n\n# 1. Extract all names from todo/ YAML files\ntodo_names = set()\ntodo_file_names = {}  # filename -> list of names\n\nfor fname in os.listdir(\"todo\"):\n    if not fname.endswith(\".yaml\"):\n        continue\n    path = os.path.join(\"todo\", fname)\n    with open(path, encoding=\"utf-8\") as f:\n        data = yaml.safe_load(f)\n    \n    members = []\n    if \"members\" in data:\n        for m in data[\"members\"]:\n            name = m.get(\"name\", \"\")\n            # Split comma-separated names\n            parts = [x.strip() for x in re.split(r'[,，]', name) if x.strip()]\n            members.extend(parts)\n    elif \"subcategories\" in data:\n        for subcat, scdata in data[\"subcategories\"].items():\n            for m in scdata.get(\"members\", []):\n                name = m.get(\"name\", \"\")\n                parts = [x.strip() for x in re.split(r'[,，]', name) if x.strip()]\n                members.extend(parts)\n    \n    todo_file_names[fname] = members\n    for n in members:\n        todo_names.add(n)\n\nprint(f\"=== TODO 条目概况 ===\")\nprint(f\"总文件数: {len(todo_file_names)}\")\ntotal_members = sum(len(v) for v in todo_file_names.values())\nprint(f\"总成员数(含别名拆分后): {total_members}\")\nprint(f\"唯一名称数: {len(todo_names)}\")\n\n# 2. Extract all names from list.yaml\nlist_names = set()   # all name: values\nlist_keys = set()    # all top-level keys\nlist_name_to_key = {}  # name -> list of keys\n\nwith open(\"src/_meta/list.yaml\", encoding=\"utf-8\") as f:\n    content = f.read()\n\n# Get top-level keys (identifiers)\nkey_pattern = re.compile(r'^([a-zA-Z0-9_][a-zA-Z0-9_\\-]*):\\s*$', re.MULTILINE)\nfor m in key_pattern.finditer(content):\n    list_keys.add(m.group(1))\n\n# Get all name: values\nname_pattern = re.compile(r'^\\s{2}name:\\s*(.*)$', re.MULTILINE)\nfor m in name_pattern.finditer(content):\n    n = m.group(1).strip().strip(\"'\\\"\")\n    list_names.add(n)\n\n# Get aliases\nalias_pattern = re.compile(r'^\\s{4}aliases:\\s*\\n(\\s{4,8}-\\s*.*(?:\\n\\s{4,8}.*)*)', re.MULTILINE)\n# Simpler: just get all lines with - under aliases\naliases = set()\nin_aliases = False\nfor line in content.split('\\n'):\n    if 'aliases:' in line:\n        in_aliases = True\n        continue\n    if in_aliases:\n        if line.strip().startswith('- '):\n            alias = line.strip()[2:].strip().strip(\"'\\\"\")\n            aliases.add(alias)\n        elif line.strip().startswith('-'):\n            alias = line.strip()[1:].strip().strip(\"'\\\"\")\n            aliases.add(alias)\n        else:\n            in_aliases = False\n\n# Also get key names from file paths\nfile_paths = set()\nfor root, dirs, files in os.walk(\"src\"):\n    if \"_meta\" in root or root == \"src\":\n        continue\n    for fn in files:\n        if fn.endswith(\".md\") and fn != \"README.md\":\n            file_paths.add(fn[:-3])  # remove .md\n\nprint(f\"\\n=== 项目已有条目概况 ===\")\nprint(f\"list.yaml 唯一 key 数: {len(list_keys)}\")\nprint(f\"list.yaml name 字段数: {len(list_names)}\")\nprint(f\"list.yaml alias 数: {len(aliases)}\")\nprint(f\".md 文件数(不含README): {len(file_paths)}\")\n\n# 3. Cross-reference: which todo names appear in the project?\n# Check against: list_keys, list_names, aliases, file_paths\nall_project_names = list_keys | list_names | aliases | file_paths\n# Normalize: lowercase for comparison\nall_project_lower = {n.lower().strip() for n in all_project_names if n}\ntodo_names_lower = {n.lower().strip() for n in todo_names if n}\n\nfound = set()\nnot_found = set()\n\nfor tname in todo_names:\n    tlower = tname.lower().strip()\n    if tlower in all_project_lower:\n        found.add(tname)\n    else:\n        # Try partial match (e.g. name contains or is contained)\n        matched = False\n        for pname in all_project_names:\n            plower = pname.lower().strip()\n            if tlower == plower:\n                matched = True\n                break\n            # Handle cases like \"180 日本 倩倩\" -> check if any project name contains \"倩倩\"\n            tparts = set(tlower.split())\n            pparts = set(plower.split())\n            if tparts & pparts:  # has common word\n                # but only if the common part is meaningful\n                common = tparts & pparts\n                for c in common:\n                    if len(c) >= 2:  # at least 2 chars\n                        matched = True\n                        break\n            if matched:\n                break\n        if not matched:\n            not_found.add(tname)\n\nprint(f\"\\n=== 交叉检查结果 ===\")\nprint(f\"在项目中找到的 todo 名称: {len(found)}\")\nprint(f\"在项目中未找到的 todo 名称: {len(not_found)}\")\n\n# Per-file breakdown\nprint(f\"\\n=== 按文件缺失情况 ===\")\nfor fname, members in sorted(todo_file_names.items()):\n    missing = [m for m in members if m not in found]\n    if missing:\n        print(f\"\\n【{fname}】缺失 {len(missing)}/{len(members)} 个条目:\")\n        for m in missing:\n            print(f\"  - {m}\")\n\nPYEOF\npython3 /tmp/check_todo.py 2>&1 || python /tmp/check_todo.py 2>&1)"]
